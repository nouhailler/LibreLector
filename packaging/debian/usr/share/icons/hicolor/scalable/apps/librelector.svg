<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fond arrondi dégradé nuit -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Livre ouvert -->
  <!-- Page gauche -->
  <path d="M38,52 L116,42 L116,190 L38,200 Z"
        fill="#334155" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Page droite -->
  <path d="M140,42 L218,52 L218,200 L140,190 Z"
        fill="#1e3a5f" stroke="#2d5282" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Dos / reliure -->
  <rect x="112" y="40" width="32" height="152" fill="#0f172a" rx="4"/>
  <rect x="120" y="40" width="16" height="152" fill="#1e293b" rx="3"/>

  <!-- Lignes de texte — page gauche -->
  <line x1="54"  y1="80"  x2="106" y2="75"  stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="54"  y1="98"  x2="106" y2="93"  stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="54"  y1="116" x2="106" y2="112" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <!-- Surlignage actif (jaune) -->
  <line x1="54"  y1="134" x2="106" y2="130" stroke="#fbbf24" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="54"  y1="152" x2="106" y2="149" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="54"  y1="170" x2="88"  y2="168" stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Lignes de texte — page droite -->
  <line x1="150" y1="75"  x2="202" y2="80"  stroke="#4a7fc1" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="93"  x2="202" y2="98"  stroke="#4a7fc1" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="112" x2="202" y2="116" stroke="#4a7fc1" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="130" x2="202" y2="134" stroke="#4a7fc1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Ondes sonores (en bas à droite du livre) -->
  <g fill="none" stroke-linecap="round">
    <!-- Point source -->
    <circle cx="196" cy="192" r="7" fill="#a78bfa" opacity="0.95"/>
    <!-- Onde 1 -->
    <path d="M 210,178 Q 222,185 222,192 Q 222,199 210,206"
          stroke="url(#wave1)" stroke-width="5.5" opacity="0.85"/>
    <!-- Onde 2 -->
    <path d="M 222,165 Q 240,178 240,192 Q 240,206 222,219"
          stroke="#8b5cf6" stroke-width="5" opacity="0.6"/>
    <!-- Onde 3 -->
    <path d="M 234,152 Q 256,171 256,192 Q 256,213 234,232"
          stroke="#7c3aed" stroke-width="4.5" opacity="0.35"/>
  </g>

  <!-- Halo de la phrase active -->
  <circle cx="80" cy="132" r="9" fill="#fbbf24" opacity="0.25"/>
</svg>
